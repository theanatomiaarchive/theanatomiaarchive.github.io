<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Pending | Anatomia Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #b5af9a; font-family: 'IM Fell English', serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .scanner { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: #ff3333; box-shadow: 0 0 15px #ff3333; animation: scan 4s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .message { text-align: center; border: 1px solid #222; padding: 40px; background: rgba(10, 10, 10, 0.9); max-width: 500px; }
        h1 { font-family: 'Playfair Display', serif; color: #ff3333; letter-spacing: 4px; margin: 0 0 20px 0; }
        p { font-style: italic; line-height: 1.6; }
        .item-no { color: #fff; font-weight: bold; font-size: 1.2rem; display: block; margin-bottom: 10px; }
        .btn { display: inline-block; margin-top: 30px; color: #555; text-decoration: none; border: 1px solid #333; padding: 10px 20px; transition: 0.3s; }
        .btn:hover { color: #ff3333; border-color: #ff3333; }
    </style>
</head>
<body>
    <div class="scanner"></div>
    <div class="message">
        <h1>ACCESS PENDING</h1>
        <span class="item-no" id="displayNum">EXHIBIT #---</span>
        <p>This entry is currently undergoing physical stabilization. The digital transcription and photographic evidence are restricted until the specimen is inert.</p>
        <p style="font-size: 0.8rem; opacity: 0.5;">REASON: Masqueraide Protocol II - Narrative Sanitization Required.</p>
        <a href="ledger.html" class="btn">RETURN TO ARCHIVE</a>
    </div>

    <script>
        // This grabs the number from the URL like ?id=402
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if(id) document.getElementById('displayNum').innerText = "EXHIBIT #" + id;
    </script>
</body>
</html>
