<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Unabridged Ledger | Anatomia Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0c;
            --card-bg: #141412;
            --parchment: #e2d1a4;
            --accent-red: #ff3333;
            --terminal-green: #00ff41;
            --text-main: #e0dbcd;
            --border-subtle: 1px solid #2e291b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'IM Fell English', serif;
            margin: 0;
            padding: 0;
        }

        header {
            padding: 30px 20px;
            border-bottom: 1px solid #4a422d;
            background: linear-gradient(to bottom, #1a1a17, #0d0d0c);
            text-align: center;
        }

        .system-status-label {
            color: var(--accent-red);
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            display: block;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin: 0;
            color: var(--parchment);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .disconnect-container {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .disconnect-link {
            color: var(--terminal-green);
            font-family: 'Courier New', monospace;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            transition: 0.2s;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.4);
        }

        .mini-cursor {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background-color: var(--terminal-green);
            margin-left: 6px;
            animation: cursorBlink 1s step-end infinite;
        }

        @keyframes cursorBlink { from, to { opacity: 0; } 50% { opacity: 1; } }

        .container {
            padding: 30px 15px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- BENTO VAULT GRID --- */
        .ledger-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .vault-entry {
            background: var(--card-bg);
            border: var(--border-subtle);
            padding: 35px 25px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Red horizontal line from your original design */
        .vault-entry::after {
            content: "";
            position: absolute;
            bottom: 0; left: 10%; width: 80%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
            opacity: 0.3;
        }

        .vault-entry h2 {
            font-family: 'Playfair Display', serif;
            color: var(--parchment);
            margin: 0 0 20px 0;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        /* --- THE 1200+ LINK CLOUD --- */
        .link-cloud {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-height: 200px; /* Limits the vertical sprawl */
            overflow-y: auto; /* Adds a scroll inside the bento if needed */
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: #2e291b transparent;
        }

        .ref-link {
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #7a7361;
            text-decoration: none;
            border: 1px solid #2e291b;
            padding: 2px 6px;
            transition: 0.2s;
        }

        .ref-link:hover {
            color: var(--accent-red);
            border-color: var(--accent-red);
            background: rgba(255, 51, 51, 0.05);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #444;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<header>
    <span class="system-status-label">SYSTEM ACCESS: ROOT_LEDGER</span>
    <h1>The Unabridged Ledger</h1>
    <div class="disconnect-container">
        <a href="index.html" class="disconnect-link">
            <span style="margin-right:8px;">←</span> DISCONNECT
            <span class="mini-cursor"></span>
        </a>
    </div>
</header>

<div class="container">
    <main class="ledger-grid">
        
        <article class="vault-entry">
            <h2>BIOLOGICAL_VAULT_01</h2>
            <div class="link-cloud" id="bio-cloud">
                </div>
        </article>

        <article class="vault-entry">
            <h2>INDUSTRIAL_VAULT_02</h2>
            <div class="link-cloud" id="ind-cloud">
                </div>
        </article>

        <article class="vault-entry">
            <h2>RITUAL_VAULT_03</h2>
            <div class="link-cloud" id="rit-cloud">
                </div>
        </article>

    </main>
</div>

<script>
    // Generates 400 links for each of the 3 bentos (Total 1200)
    function generateLinks(containerId, prefix) {
        const container = document.getElementById(containerId);
        for (let i = 1; i <= 400; i++) {
            const link = document.createElement('a');
            link.href = `pending.html?id=${prefix}-${i}`;
            link.className = 'ref-link';
            // Formats as 001, 002, etc.
            const padId = String(i).padStart(3, '0');
            link.innerText = `REF_${prefix}_${padId}`;
            container.appendChild(link);
        }
    }

    // Run on load
    generateLinks('bio-cloud', 'BIO');
    generateLinks('ind-cloud', 'IND');
    generateLinks('rit-cloud', 'RIT');
</script>

</body>
</html>
