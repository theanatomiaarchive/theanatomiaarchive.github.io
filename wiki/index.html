<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anatomia Archive | Ledger Index</title>
    <script src="../archive-lock.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0c;
            --parchment: #e2d1a4;
            --accent-red: #ff3333;
            --terminal-green: #00ff41;
            --text-main: #e0dbcd;
            --border-style: 1px solid #4a422d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'IM Fell English', serif;
            margin: 0;
            padding: 0;
            line-height: 1.4;
        }

        header {
            padding: 30px 10px;
            border-bottom: var(--border-style);
            background: linear-gradient(to bottom, #1a1a17, #0d0d0c);
            text-align: center;
        }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .logo-img {
            width: 65px;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(255, 51, 51, 0.5));
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin: 0;
            color: var(--parchment);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-style: italic;
            color: #b5af9a;
            font-size: 0.9rem;
            margin-top: 10px;
            display: block;
        }

        nav {
            padding: 10px;
            background: #141412;
            border-bottom: var(--border-style);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-bar {
            background: #000;
            border: 1px solid #4a422d;
            color: var(--parchment);
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'IM Fell English', serif;
            font-size: 1rem;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .artifact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .artifact-card {
            background: #141412;
            border: 1px solid #2e291b;
            padding: 20px;
            text-decoration: none;
            display: block;
            transition: all 0.3s ease;
        }

        .artifact-card:hover {
            border-color: var(--accent-red);
            background: #1a1a17;
            transform: translateY(-2px);
        }

        .artifact-card.saturday-item {
            border: 1px solid #6e1a1a;
            background: #1a0f0f;
            box-shadow: inset 0 0 10px rgba(255, 51, 51, 0.05);
        }

        .catalog-no {
            font-size: 0.75rem;
            color: var(--accent-red);
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        .artifact-card h2 {
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            color: var(--parchment);
            font-family: 'Playfair Display', serif;
        }

        .artifact-card p {
            font-size: 0.95rem;
            margin: 0;
            color: var(--text-main);
            font-style: italic;
        }

        .hidden { display: none; }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filters button {
            background: #1a1a17;
            border: 1px solid #4a422d;
            color: var(--parchment);
            padding: 8px 16px;
            font-family: 'IM Fell English', serif;
            cursor: pointer;
        }
