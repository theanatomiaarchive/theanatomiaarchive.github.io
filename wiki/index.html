<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anatomia Archive | Masqueraide Workshop</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #080808; 
            --parchment: #e2d1a4; 
            --red: #ff3333; 
            --dim: #888273; 
            --terminal-green: #00ff41; 
        }
        
        body { background: var(--bg); color: #b5af9a; font-family: 'IM Fell English', serif; margin: 0; overflow-x: hidden; }

        /* --- COMPACT HEADER --- */
        header { 
            padding: 25px 20px 15px; 
            border-bottom: 3px double var(--red); 
            max-width: 1200px; 
            margin: 0 auto; 
            text-align: left;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            color: var(--parchment); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin: 5px 0; 
            font-size: 1.4rem; 
        }

        .system-status-header {
            color: var(--red); 
            font-weight: bold; 
            font-size: 0.7rem; 
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        /* --- FILTER BUTTON FIX --- */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #4a422d;
            color: var(--parchment);
            font-family: 'IM Fell English', serif;
            padding: 10px 20px; /* Restored padding to ensure text is visible */
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
            min-width: 80px; /* Prevents box collapse */
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--red);
            background: rgba(255, 51, 51, 0.05);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.2);
        }

        /* --- GRID & CARDS --- */
        .archive-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .artifact-card {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            transition: 0.4s;
            text-decoration: none;
            color: inherit;
        }

        .artifact-card:hover {
            border-color: var(--red);
            transform: translateY(-5px);
        }

        /* --- TERMINAL LINK --- */
        .terminal-link {
            color: var(--terminal-green);
            font-family: 'Courier New', monospace;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.4);
            font-weight: bold;
        }

        .mini-cursor {
            display: inline-block;
            width: 7px;
            height: 0.9rem;
            background-color: var(--terminal-green);
            margin-left: 6px;
            animation: cursorBlink 1s step-end infinite;
        }
        @keyframes cursorBlink { from, to { opacity: 0; } 50% { opacity: 1; } }

        footer { text-align: center; padding: 40px; border-top: 1px solid #222; margin-top: 40px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <div class="system-status-header">ARCHIVE_ACCESS: GRANTED</div>
        <a href="ledger.html" class="terminal-link">
            OPEN UNABRIDGED LEDGER <span class="mini-cursor"></span>
        </a>
    </div>
    <h1>The Anatomia Archive</h1>
</header>

<div class="filter-container">
    <button class="filter-btn active">View All</button>
    <button class="filter-btn">Bio</button>
    <button class="filter-btn">Ind</button>
    <button class="filter-btn">Rit</button>
</div>

<main class="archive-grid">
    <a href="exhibit-a.html" class="artifact-card">
        <span style="color:var(--red); font-size: 0.7rem; letter-spacing: 2px;">EXHIBIT A</span>
        <h2 style="color:var(--parchment); font-family:'Playfair Display';">The Silt Specimen</h2>
        <p style="font-size: 0.9rem; font-style: italic;">Musculoskeletal mimicry recovered from the Blackwood site.</p>
    </a>
    
    </main>

<footer>
    <span style="font-style: italic; color: var(--dim);">Property of Masqueraide Workshop &copy; 2026</span>
</footer>

</body>
</html>
