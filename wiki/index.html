<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ledger // Anatomia Archive</title>
    
    <script src="../archive-lock.js"></script>

    <style>
        :root {
            --bg-color: #0d0d0c;
            --parchment: #e2d1a4;
            /* Updated to the Silt Page bright crimson */
            --accent-red: #ff3333; 
            --dark-red: #c21d1d;
            --text-main: #e0dbcd;
            --border-style: 1px solid #4a422d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'IM Fell English', serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .ledger-header {
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-red);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .specimen-link {
            display: block;
            color: var(--parchment);
            text-decoration: none;
            padding: 10px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .specimen-link:hover {
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            background: rgba(255, 51, 51, 0.05);
        }

        /* The footer where the banner will attach */
        footer {
            margin-top: 50px;
            border-top: 1px solid #1a1a17;
            padding-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="ledger-header">
        <h1>The Ledger</h1>
        <p style="font-size: 0.9rem; color: #666;">Total Specimens Documented: [XX] / 100</p>
    </div>

    <div class="specimen-list">
        <a href="silt.html" class="specimen-link">
            [001] - Blackwood Silt (Musculoskeletal Mimicry)
        </a>
        </div>

    <footer>
        <p>© 1894 The Anatomia Archive // All Rights Reserved</p>
    </footer>

</body>
</html>
