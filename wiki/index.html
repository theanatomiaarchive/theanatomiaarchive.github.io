<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anatomia Archive | Index</title>
    <script src="../archive-lock.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0c;
            --parchment: #e2d1a4;
            --accent-red: #ff3333;
            --text-main: #e0dbcd;
            --border-style: 1px solid #4a422d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'IM Fell English', serif;
            margin: 0;
            padding: 0;
            line-height: 1.4;
        }

        header {
            padding: 20px 10px;
            border-bottom: var(--border-style);
            background: linear-gradient(to bottom, #1a1a17, #0d0d0c);
            text-align: center;
        }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .logo-img {
            width: 45px;
            height: auto;
            filter: drop-shadow(0 0 5px rgba(255, 51, 51, 0.4));
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin: 0;
            color: var(--parchment);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            font-style: italic;
            color: #b5af9a;
            font-size: 0.85rem;
            margin: 8px auto 0;
            display: block;
            max-width: 90%;
        }

        nav {
            padding: 8px;
            background: #141412;
            border-bottom: var(--border-style);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-bar {
            background: #000;
            border: 1px solid #4a422d;
            color: var(--parchment);
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'IM Fell English', serif;
            font-size: 1rem;
        }

        .container {
            padding: 10px 15px;
        }

        .sidebar h3 {
            color: var(--parchment);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-align: center;
            border-bottom: var(--border-style);
            padding-bottom: 5px;
            margin: 15px 0 10px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }

        .sidebar button, .sidebar a {
            background: #1a1a17;
            border: 1px solid #3d3622;
            color: #a39c89;
            padding: 5px 10px;
            font-size: 0.85rem;
            text-decoration: none;
            font-family: 'IM Fell English', serif;
            border-radius: 2px;
        }

        .artifact-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .artifact-card {
            background: #141412;
            border: 1px solid #2e291b;
            padding: 15px;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }

        .artifact-card:hover:not(.draft) {
            border-color: var(--accent-red);
            background: #1a1a17;
        }

        .artifact-card.hidden { display: none; }

            font-size: 0.7rem;
            color: var(--accent-red);
            font-weight: bold;
